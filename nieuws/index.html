<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f4f5; --surface: #fff; --border: #e4e4e7;
  --text: #18181b; --muted: #71717a; --accent: #d10a10;
  --nav: #111; --radius: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,.08);
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #09090b; --surface: #18181b; --border: #27272a;
    --text: #fafafa; --muted: #a1a1aa; --shadow: 0 1px 4px rgba(0,0,0,.4); }
}
[data-theme="dark"] {
  --bg: #09090b; --surface: #18181b; --border: #27272a;
  --text: #fafafa; --muted: #a1a1aa; --shadow: 0 1px 4px rgba(0,0,0,.4);
}
[data-theme="light"] {
  --bg: #f4f4f5; --surface: #fff; --border: #e4e4e7;
  --text: #18181b; --muted: #71717a; --shadow: 0 1px 4px rgba(0,0,0,.08);
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
.header { position: sticky; top: 0; z-index: 100; background: var(--nav);
  padding: 0 12px; display: flex; align-items: center; gap: 10px;
  height: 56px; box-shadow: 0 2px 8px rgba(0,0,0,.35); }
.logo { font-size: 1.2rem; font-weight: 900; color: #fff; text-decoration: none;
  letter-spacing: -.5px; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
.search-wrap { flex: 1; max-width: 320px; margin-left: auto; }
.search { width: 100%; border: none; border-radius: 20px; padding: 7px 14px;
  background: #2a2a2a; color: #fff; font-size: .9rem; outline: none; }
.search::placeholder { color: #666; }
.search:focus { background: #333; }
.theme-btn { background: none; border: none; color: #ccc; font-size: 1.2rem;
  cursor: pointer; padding: 4px; flex-shrink: 0; line-height: 1; }

/* Category tabs */
.cats { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none;
  padding: 10px 12px; background: var(--nav); border-bottom: 1px solid #222; }
.cats::-webkit-scrollbar { display: none; }
.cat { flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px; cursor: pointer; padding: 7px 13px; color: #888;
  transition: background .15s, color .15s, border-color .15s; }
.cat-icon { font-size: .95rem; line-height: 1; }
.cat-label { font-size: .72rem; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; }
.cat.active { background: rgba(255,255,255,.15); color: #fff; border-color: rgba(255,255,255,.28); }
.cat:hover:not(.active) { background: rgba(255,255,255,.1); color: #bbb; }

/* Source filter bar */
.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 16px 6px;
  background: var(--bg); border-bottom: 1px solid var(--border); min-height: 0; }
.filter-bar:empty { display: none; }
.src-chip { font-size: .7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  color: #fff; cursor: pointer; border: 2px solid transparent;
  opacity: .6; transition: opacity .15s, border-color .15s; }
.src-chip.active { opacity: 1; border-color: #fff; }

/* Grid */
.container { max-width: 960px; margin: 0 auto; padding: 16px; }
.count { font-size: .8rem; color: var(--muted); margin-bottom: 12px; }
.grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

/* Card */
.card { display: flex; flex-direction: column; background: var(--surface);
  border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow); border: 1px solid var(--border);
  transition: transform .15s, box-shadow .15s; }
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
.card-link { text-decoration: none; color: inherit; display: flex; flex-direction: column; flex: 1; }
.card-img { width: 100%; height: 180px; object-fit: cover; display: block; }
.card-body { padding: 14px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
.card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.badge { font-size: .65rem; font-weight: 700; padding: 2px 7px; border-radius: 4px;
  color: #fff; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap;
  cursor: pointer; }
.badge-new { font-size: .6rem; font-weight: 800; padding: 2px 6px; border-radius: 4px;
  background: var(--accent); color: #fff; text-transform: uppercase; letter-spacing: .5px;
  animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.5} }
.time { font-size: .75rem; color: var(--muted); }
.rt { font-size: .7rem; color: var(--muted); margin-left: auto; }
.card-title { font-size: 1rem; font-weight: 700; line-height: 1.35; flex: 1; }
.card-desc { font-size: .82rem; color: var(--muted); line-height: 1.5; }
.card-actions { display: flex; align-items: center; gap: 6px; padding: 8px 14px;
  border-top: 1px solid var(--border); }
.btn-action { background: none; border: none; cursor: pointer; padding: 4px 8px;
  border-radius: 6px; font-size: .8rem; color: var(--muted);
  transition: background .15s, color .15s; }
.btn-action:hover { background: var(--border); color: var(--text); }
.btn-action.saved { color: var(--accent); }

/* States */
.empty { padding: 48px; text-align: center; color: var(--muted); grid-column: 1/-1; }
.spinner { display: flex; gap: 8px; justify-content: center; padding: 48px; grid-column: 1/-1; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent);
  animation: pulse 1.2s infinite ease-in-out; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)} }
.reload-btn { margin-top: 12px; padding: 9px 22px; background: var(--accent);
  color: #fff; border: none; border-radius: 8px; font-size: .9rem;
  font-weight: 600; cursor: pointer; }

/* Scroll-to-top */
.scroll-top { position: fixed; bottom: 24px; right: 20px; width: 44px; height: 44px;
  border-radius: 50%; background: var(--accent); color: #fff; border: none;
  font-size: 1.3rem; cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.25);
  opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 50; }
.scroll-top.visible { opacity: 1; pointer-events: auto; }

/* Toast */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 10px 20px; border-radius: 24px;
  font-size: .85rem; pointer-events: none; z-index: 200;
  animation: fadeInOut 2.6s ease forwards; white-space: nowrap; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(10px)}
  15%,80%{opacity:1;transform:translateX(-50%) translateY(0)}
  100%{opacity:0;transform:translateX(-50%) translateY(10px)} }

.footer { text-align: center; padding: 32px 16px; color: var(--muted); font-size: .8rem; }
.footer a { color: var(--muted); }
</style>

<script>
var newsData = window.__NEWS_DATA__ || null;
var currentCat = "nieuws";
var allArticles = [];
var searchQ = "";
var sourceFilter = "";
var bookmarks = [];
try { bookmarks = JSON.parse(localStorage.getItem("bnws_bk") || "[]"); } catch(e) {}

/* ---- Utilities ---- */
function esc(s) {
  return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function timeAgo(ts) {
  if (!ts) return "";
  var m = Math.floor((Date.now() - ts) / 60000);
  if (m < 2) return "net";
  if (m < 60) return m + "m";
  var h = Math.floor(m / 60);
  if (h < 24) return h + "u";
  return Math.floor(h / 24) + "d";
}

function readTime(title, desc) {
  var w = ((title || "") + " " + (desc || "")).split(" ").length;
  return Math.max(1, Math.min(9, Math.round(w / 30)));
}

function showToast(msg) {
  var t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 2700);
}

/* ---- Theme ---- */
(function() {
  var saved = "";
  try { saved = localStorage.getItem("bnws_theme") || ""; } catch(e) {}
  if (saved) {
    document.documentElement.setAttribute("data-theme", saved);
    document.getElementById("themeBtn").textContent = saved === "dark" ? "☀️" : "🌙";
  }
})();

document.getElementById("themeBtn").addEventListener("click", function() {
  var cur = document.documentElement.getAttribute("data-theme");
  var sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  var isDark = cur === "dark" ? false : cur === "light" ? true : !sysDark;
  var theme = isDark ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", theme);
  try { localStorage.setItem("bnws_theme", theme); } catch(e) {}
  this.textContent = isDark ? "☀️" : "🌙";
});

/* ---- Bookmarks ---- */
function saveBookmarks() {
  try { localStorage.setItem("bnws_bk", JSON.stringify(bookmarks)); } catch(e) {}
}

function toggleBookmark(link) {
  var idx = bookmarks.indexOf(link);
  if (idx >= 0) { bookmarks.splice(idx, 1); showToast("Verwijderd uit opgeslagen"); }
  else { bookmarks.push(link); showToast("Opgeslagen! 🔖"); }
  saveBookmarks();
}

function getBookmarked() {
  if (!newsData) return [];
  var all = [];
  Object.keys(newsData).forEach(function(k) {
    if (Array.isArray(newsData[k])) all = all.concat(newsData[k]);
  });
  return all.filter(function(a) { return bookmarks.indexOf(a.link) >= 0; });
}

/* ---- Source chips ---- */
function renderSourceChips(arts) {
  var bar = document.getElementById("filterBar");
  if (!arts || !arts.length) { bar.innerHTML = ""; return; }
  var seen = {};
  arts.forEach(function(a) { seen[a.source] = a.accent; });
  bar.innerHTML = Object.keys(seen).map(function(src) {
    var active = sourceFilter === src ? " active" : "";
    return "<span class=\"src-chip" + active + "\" style=\"background:" + seen[src] + "\" data-src=\"" + esc(src) + "\">" + esc(src) + "</span>";
  }).join("");
}

document.getElementById("filterBar").addEventListener("click", function(e) {
  var chip = e.target.closest(".src-chip");
  if (!chip) return;
  sourceFilter = sourceFilter === chip.dataset.src ? "" : chip.dataset.src;
  renderSourceChips(allArticles);
  render();
});

/* ---- Card ---- */
function card(a) {
  var isNew = a.ts && (Date.now() - a.ts) < 3600000;
  var isBk = bookmarks.indexOf(a.link) >= 0;
  var time = timeAgo(a.ts);
  var rt = readTime(a.title, a.desc);
  var imgHtml = a.img
    ? "<img class=\"card-img\" src=\"" + esc(a.img) + "\" alt=\"\" loading=\"lazy\" onerror=\"this.style.display='none'\">"
    : "";
  return "<div class=\"card\">" +
    "<a class=\"card-link\" href=\"" + esc(a.link) + "\" target=\"_blank\" rel=\"noopener\">" +
    imgHtml +
    "<div class=\"card-body\">" +
    "<div class=\"card-meta\">" +
    (isNew ? "<span class=\"badge-new\">Nieuw</span>" : "") +
    "<span class=\"badge\" style=\"background:" + a.accent + "\" data-src=\"" + esc(a.source) + "\">" + esc(a.source) + "</span>" +
    (time ? "<span class=\"time\">" + time + " geleden</span>" : "") +
    "<span class=\"rt\">" + rt + " min</span>" +
    "</div>" +
    "<h2 class=\"card-title\">" + esc(a.title) + "</h2>" +
    (a.desc ? "<p class=\"card-desc\">" + esc(a.desc) + "</p>" : "") +
    "</div></a>" +
    "<div class=\"card-actions\">" +
    "<button class=\"btn-action" + (isBk ? " saved" : "") + "\" data-bk=\"" + esc(a.link) + "\" title=\"" + (isBk ? "Verwijder bladwijzer" : "Bewaar artikel") + "\">" + (isBk ? "🔖" : "☆") + "</button>" +
    "<button class=\"btn-action\" data-share=\"" + esc(a.link) + "\" data-title=\"" + esc(a.title) + "\" title=\"Deel artikel\">↗</button>" +
    "</div>" +
    "</div>";
}

/* ---- Render ---- */
function render() {
  var grid = document.getElementById("grid");
  var countEl = document.getElementById("count");
  var arts = allArticles;
  if (sourceFilter) arts = arts.filter(function(a) { return a.source === sourceFilter; });
  if (searchQ) arts = arts.filter(function(a) {
    return a.title.toLowerCase().indexOf(searchQ) >= 0 ||
           (a.desc || "").toLowerCase().indexOf(searchQ) >= 0;
  });
  countEl.textContent = arts.length + " artikel" + (arts.length !== 1 ? "s" : "");
  if (!arts.length) {
    var msg = currentCat === "opgeslagen"
      ? "Nog niets opgeslagen. Klik ☆ op een artikel om het te bewaren."
      : searchQ ? "Geen resultaten voor \"" + esc(searchQ) + "\"." : "Geen artikels gevonden. Probeer later opnieuw.";
    grid.innerHTML = "<div class=\"empty\">" + msg +
      (searchQ || currentCat === "opgeslagen" ? "" : "<br><br><button class=\"reload-btn\" id=\"reloadBtn\">Herlaad pagina</button>") +
      "</div>";
    var rb = document.getElementById("reloadBtn");
    if (rb) rb.addEventListener("click", function() { location.reload(true); });
  } else {
    grid.innerHTML = arts.map(card).join("");
  }
}

/* ---- Card actions (event delegation) ---- */
document.getElementById("grid").addEventListener("click", function(e) {
  var bkBtn = e.target.closest("[data-bk]");
  if (bkBtn) {
    e.preventDefault();
    toggleBookmark(bkBtn.dataset.bk);
    var isBk = bookmarks.indexOf(bkBtn.dataset.bk) >= 0;
    bkBtn.classList.toggle("saved", isBk);
    bkBtn.textContent = isBk ? "🔖" : "☆";
    bkBtn.title = isBk ? "Verwijder bladwijzer" : "Bewaar artikel";
    return;
  }
  var shareBtn = e.target.closest("[data-share]");
  if (shareBtn) {
    e.preventDefault();
    var url = shareBtn.dataset.share;
    var title = shareBtn.dataset.title;
    if (navigator.share) {
      navigator.share({ title: title, url: url }).catch(function() {});
    } else {
      navigator.clipboard.writeText(url).then(function() {
        showToast("Link gekopieerd!");
      }).catch(function() { showToast("Deel: " + url); });
    }
    return;
  }
  var badge = e.target.closest(".badge[data-src]");
  if (badge) {
    e.preventDefault();
    sourceFilter = sourceFilter === badge.dataset.src ? "" : badge.dataset.src;
    renderSourceChips(allArticles);
    render();
  }
});

/* ---- Load category ---- */
async function loadCat(cat) {
  currentCat = cat;
  allArticles = [];
  sourceFilter = "";
  renderSourceChips([]);

  if (cat === "opgeslagen") {
    allArticles = getBookmarked();
    renderSourceChips(allArticles);
    render();
    return;
  }

  var hasArticles = newsData && newsData[cat] && newsData[cat].length > 0;
  if (!hasArticles) {
    document.getElementById("grid").innerHTML = "<div class=\"spinner\"><div class=\"dot\"></div><div class=\"dot\"></div><div class=\"dot\"></div></div>";
    document.getElementById("count").textContent = "Laden…";
    try {
      var r = await fetch("/nieuws/data.json?t=" + Math.floor(Date.now() / 300000));
      if (!r.ok) throw new Error("HTTP " + r.status);
      newsData = await r.json();
    } catch(e) {
      document.getElementById("grid").innerHTML = "<div class=\"empty\">Kon nieuws niet laden.<br><br><button class=\"reload-btn\" id=\"reloadBtn\">Herlaad pagina</button></div>";
      document.getElementById("count").textContent = "";
      var rb = document.getElementById("reloadBtn");
      if (rb) rb.addEventListener("click", function() { location.reload(true); });
      return;
    }
  }
  allArticles = (newsData && newsData[cat]) ? newsData[cat] : [];
  renderSourceChips(allArticles);
  render();
}

/* ---- Category switcher ---- */
document.getElementById("cats").addEventListener("click", function(e) {
  var btn = e.target.closest(".cat");
  if (!btn) return;
  document.querySelectorAll(".cat").forEach(function(c) { c.classList.remove("active"); });
  btn.classList.add("active");
  searchQ = "";
  document.getElementById("search").value = "";
  loadCat(btn.dataset.cat);
});

/* ---- Search ---- */
var searchTimer;
document.getElementById("search").addEventListener("input", function(e) {
  clearTimeout(searchTimer);
  var val = e.target.value;
  searchTimer = setTimeout(function() {
    searchQ = val.toLowerCase().trim();
    render();
  }, 250);
});

/* ---- Scroll-to-top ---- */
var scrollBtn = document.getElementById("scrollTop");
window.addEventListener("scroll", function() {
  if (window.scrollY > 320) scrollBtn.classList.add("visible");
  else scrollBtn.classList.remove("visible");
}, { passive: true });
scrollBtn.addEventListener("click", function() {
  window.scrollTo({ top: 0, behavior: "smooth" });
});

/* ---- Auto-refresh every 20 min ---- */
setInterval(async function() {
  if (currentCat === "opgeslagen") return;
  try {
    var r = await fetch("/nieuws/data.json?t=" + Date.now());
    if (!r.ok) return;
    var fresh = await r.json();
    if (!fresh || !fresh[currentCat]) return;
    var prev = newsData && newsData[currentCat] ? newsData[currentCat].length : 0;
    if (fresh[currentCat].length !== prev) {
      newsData = fresh;
      allArticles = newsData[currentCat];
      renderSourceChips(allArticles);
      render();
      showToast("Nieuws bijgewerkt ✓");
    }
  } catch(e) {}
}, 20 * 60 * 1000);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("/nieuws/sw.js", { scope: "/nieuws/" }).catch(function() {});
  });
}

loadCat("nieuws");
</script>
</body>
</html>
