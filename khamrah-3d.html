<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khamrah Lattafa – 3D Parfum</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #ffffff;
      overflow: hidden;
      font-family: Georgia, serif;
      -webkit-user-select: none;
      user-select: none;
    }
    #stage {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      cursor: grab;
    }
    #stage:active { cursor: grabbing; }
    .scene { perspective: 900px; }
    #bg {
      position: relative; width: 0; height: 0;
      transform-style: preserve-3d;
    }
    .part { position: absolute; transform-style: preserve-3d; }
    .face { position: absolute; }

    #ui {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      text-align: center; pointer-events: none;
    }
    #ui h1 {
      color: rgba(120,80,10,.9); font-size: 1.2rem;
      letter-spacing: 5px; font-weight: normal; text-transform: uppercase;
    }
    #ui .ar { color: rgba(140,90,10,.6); font-size: 1.05rem; margin-top: 3px; }
    #ui p {
      color: rgba(100,70,10,.4); font-size: .58rem;
      letter-spacing: 3px; margin-top: 7px; text-transform: uppercase;
    }
    #hint {
      position: fixed; top: 18px; left: 50%;
      transform: translateX(-50%);
      color: rgba(100,70,10,.45); font-size: .6rem;
      letter-spacing: 3px; text-transform: uppercase;
      pointer-events: none; white-space: nowrap;
      transition: opacity 1.5s;
    }
    #hint.gone { opacity: 0; }
    #btn {
      position: fixed; bottom: 26px; right: 18px;
      background: rgba(180,130,20,.1);
      border: 1px solid rgba(160,110,20,.35);
      color: rgba(100,65,5,.8); font-size: .58rem;
      letter-spacing: 2px; padding: 8px 14px;
      cursor: pointer; text-transform: uppercase; border-radius: 2px;
    }
    #btn:hover { background: rgba(180,130,20,.2); }
  </style>
</head>
<body>
<div id="stage"><div class="scene"><div id="bg"></div></div></div>
<div id="hint">Sleep om te draaien &nbsp;·&nbsp; Scroll om in te zoomen</div>
<div id="ui">
  <h1>Khamrah &nbsp;·&nbsp; Lattafa</h1>
  <div class="ar">خمرة</div>
  <p>For Women &amp; Men &nbsp;·&nbsp; Eau de Parfum</p>
</div>
<button id="btn">⟳ Auto-rotatie</button>

<script>
// ── Label canvas ──────────────────────────────────────────────────────────────
const lc = document.createElement('canvas');
lc.width = 300; lc.height = 190;
const lx = lc.getContext('2d');
const grad = lx.createLinearGradient(0, 0, 300, 190);
grad.addColorStop(0,   '#5a3e08');
grad.addColorStop(0.2, '#b87e18');
grad.addColorStop(0.5, '#e8bc42');
grad.addColorStop(0.8, '#b87e18');
grad.addColorStop(1,   '#5a3e08');
lx.fillStyle = grad;
lx.fillRect(0, 0, 300, 190);
lx.strokeStyle = '#ffe880'; lx.lineWidth = 5;
lx.strokeRect(7, 7, 286, 176);
lx.lineWidth = 1.5;
lx.strokeRect(13, 13, 274, 164);
lx.fillStyle = '#140700';
lx.textAlign = 'center'; lx.textBaseline = 'middle';
lx.font = 'bold 64px serif'; lx.fillText('خمرة', 150, 72);
lx.font = 'bold 26px serif'; lx.fillText('KHAMRAH', 150, 128);
lx.font = '15px serif';      lx.fillText('Lattafa Perfumes', 150, 162);
const LSRC = lc.toDataURL();

// ── Bottle dimensions ─────────────────────────────────────────────────────────
const W = 120, D = 120;
const HZ = D / 2; // = 60, used for left/right/front/back translateZ

// Face style helpers
const CUT = (hi) =>
  `background:
    repeating-linear-gradient(45deg,
      rgba(255,255,255,${hi ? 0.22 : 0.14}) 0,
      rgba(255,255,255,${hi ? 0.22 : 0.14}) 1px,
      transparent 1px, transparent 18px),
    repeating-linear-gradient(-45deg,
      rgba(255,255,255,${hi ? 0.22 : 0.14}) 0,
      rgba(255,255,255,${hi ? 0.22 : 0.14}) 1px,
      transparent 1px, transparent 18px),
    linear-gradient(180deg, rgba(228,240,255,0.27) 0%, rgba(190,215,255,0.14) 100%);
  border:1px solid rgba(200,225,255,0.3);
  ${hi ? 'box-shadow:inset 14px 0 22px rgba(255,255,255,0.09),inset -7px 0 12px rgba(255,255,255,0.05);' : ''}`;

const CLR = (hi) =>
  `background:linear-gradient(180deg,rgba(215,232,255,0.17) 0%,rgba(185,210,255,0.09) 100%);
  border:1px solid rgba(200,225,255,0.2);
  ${hi ? 'box-shadow:inset 10px 0 16px rgba(255,255,255,0.07);' : ''}`;

const AMBER =
  `background:linear-gradient(180deg,rgba(195,98,0,0.82) 0%,rgba(148,60,0,0.9) 100%);`;

const GOLD =
  `background:linear-gradient(135deg,#9a6e10 0%,#e8b838 35%,#c08828 65%,#6e5012 100%);
  border:1px solid rgba(255,215,80,0.3);`;

const CAPG = (hi) =>
  `background:linear-gradient(180deg,rgba(228,240,255,0.28) 0%,rgba(200,220,255,0.15) 100%);
  border:1px solid rgba(200,225,255,0.25);
  ${hi ? 'box-shadow:inset 7px 0 13px rgba(255,255,255,0.09);' : ''}`;

// ── Build a 3D box part ────────────────────────────────────────────────────────
// yTop: CSS top relative to bg center (0,0)
// w/h/d: dimensions; for this bottle w=d=120 always
function makePart(yTop, w, h, d, fs) {
  const el = document.createElement('div');
  el.className = 'part';
  el.style.cssText =
    `width:${w}px;height:${h}px;left:${-w / 2}px;top:${yTop}px;`;

  // [key, transform, face-width, face-height, face-left-offset, face-top-offset]
  const defs = [
    ['front', `translateZ(${d / 2}px)`,                 w, h, 0,         0],
    ['back',  `rotateY(180deg) translateZ(${d / 2}px)`, w, h, 0,         0],
    ['right', `rotateY(90deg) translateZ(${w / 2}px)`,  d, h, (w - d)/2, 0],
    ['left',  `rotateY(-90deg) translateZ(${w / 2}px)`, d, h, (w - d)/2, 0],
    ['top',   `rotateX(90deg) translateZ(${h / 2}px)`,  w, d, 0,         (h - d)/2],
    ['bot',   `rotateX(-90deg) translateZ(${h / 2}px)`, w, d, 0,         (h - d)/2],
  ];

  defs.forEach(([key, t, fw, fh, fl, ft]) => {
    const f = document.createElement('div');
    f.className = 'face';
    f.style.cssText =
      `width:${fw}px;height:${fh}px;left:${fl}px;top:${ft}px;transform:${t};`;
    f.style.cssText += fs[key] || fs['*'] || '';
    el.appendChild(f);
  });
  return el;
}

// ── Part heights & y-positions ────────────────────────────────────────────────
// cap=65, collar=8, upper=161, divider=7, lower=145, base=7  → total=393
const TOTAL = 393;
const MID = -TOTAL / 2; // top of cap relative to bg center

const capY  = MID;           // top of cap
const colY  = MID +  65;     // top of collar
const upY   = MID +  73;     // top of upper body
const divY  = MID + 234;     // top of divider
const lowY  = MID + 241;     // top of lower body
const baseY = MID + 386;     // top of base

// ── Assemble bottle (back-to-front for painter's order) ──────────────────────
const bg = document.getElementById('bg');

// Base gold
bg.appendChild(makePart(baseY, W + 4, 7, D + 4, { '*': GOLD }));

// Amber liquid (inner box inside lower body)
bg.appendChild(makePart(lowY + 4, W - 10, 137, D - 10, {
  front: AMBER, back: AMBER, left: AMBER, right: AMBER,
  top: `background:radial-gradient(ellipse,rgba(210,120,0,0.4) 0%,rgba(160,75,0,0.3) 100%);`,
  bot: `background:rgba(80,30,0,0.95);`,
}));

// Lower glass shell
bg.appendChild(makePart(lowY, W, 145, D, {
  front: CLR(true), back: CLR(false), left: CLR(false), right: CLR(false),
  top: `background:rgba(215,232,255,0.13);`,
  bot: `background:rgba(215,232,255,0.08);`,
}));

// Label front
const mkLabel = (front) => {
  const f = document.createElement('div');
  const lw = 96, lh = 68;
  const tz = D / 2 + 1;
  const tr = front
    ? `translateZ(${tz}px)`
    : `rotateY(180deg) translateZ(${tz}px)`;
  f.style.cssText =
    `position:absolute;width:${lw}px;height:${lh}px;` +
    `left:${-lw / 2}px;top:${lowY + (145 - lh) / 2 + 8}px;` +
    `transform:${tr};` +
    `background:url('${LSRC}') center/cover no-repeat;border-radius:1px;`;
  return f;
};
bg.appendChild(mkLabel(true));
bg.appendChild(mkLabel(false));

// Gold divider ring
bg.appendChild(makePart(divY, W + 4, 7, D + 4, { '*': GOLD }));

// Upper cut-glass body
bg.appendChild(makePart(upY, W, 161, D, {
  front: CUT(true), back: CUT(false), left: CUT(false), right: CUT(false),
  top: `background:rgba(220,235,255,0.15);`,
  bot: `background:rgba(220,235,255,0.1);`,
}));

// Gold collar
bg.appendChild(makePart(colY, W + 4, 8, D + 4, { '*': GOLD }));

// Cap
bg.appendChild(makePart(capY, W - 12, 65, D - 12, {
  front: CAPG(true), back: CAPG(false), left: CAPG(false), right: CAPG(false),
  top: GOLD,
  bot: `background:rgba(220,235,255,0.1);`,
}));

// ── Interaction ───────────────────────────────────────────────────────────────
// Scale bottle to fit viewport
const initZoom = Math.min(window.innerHeight / 520, window.innerWidth / 360, 1.6);
let rotY = 20, rotX = -10, zoom = initZoom;
let dragging = false, lastX = 0, lastY = 0, velY = 0;
let autoOn = true, raf = 0, prevT = 0;

function applyT() {
  bg.style.transform =
    `rotateX(${rotX}deg) rotateY(${rotY}deg) scale(${zoom})`;
}
applyT();

function loopFn(t) {
  const dt = Math.min(t - prevT, 50);
  prevT = t;
  rotY += dt * 0.035;
  applyT();
  raf = requestAnimationFrame(loopFn);
}
function startAuto() {
  autoOn = true;
  document.getElementById('btn').textContent = '⏸ Stoppen';
  prevT = performance.now();
  raf = requestAnimationFrame(loopFn);
}
function stopAuto() {
  autoOn = false;
  cancelAnimationFrame(raf);
  document.getElementById('btn').textContent = '⟳ Auto-rotatie';
}
startAuto();

function onDown(x, y) { dragging = true; stopAuto(); velY = 0; lastX = x; lastY = y; }
function onMove(x, y) {
  if (!dragging) return;
  velY = (x - lastX) * 0.55;
  rotY += velY;
  rotX = Math.max(-35, Math.min(15, rotX + (y - lastY) * 0.22));
  lastX = x; lastY = y;
  applyT();
}
function onUp() {
  if (!dragging) return; dragging = false;
  (function coast() {
    velY *= 0.92; rotY += velY; applyT();
    if (Math.abs(velY) > 0.06) requestAnimationFrame(coast);
  })();
}

const stage = document.getElementById('stage');
stage.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
window.addEventListener('mouseup', onUp);
stage.addEventListener('touchstart', e => {
  if (e.touches.length === 1) onDown(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });
window.addEventListener('touchmove', e => {
  if (dragging && e.touches.length === 1)
    onMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });
window.addEventListener('touchend', onUp);

window.addEventListener('wheel', e => {
  e.preventDefault();
  zoom = Math.max(0.3, Math.min(3, zoom * (1 - e.deltaY * 0.001)));
  applyT();
}, { passive: false });

let p0d = 0, p0z = 1;
window.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    dragging = false;
    p0d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    p0z = zoom;
  }
}, { passive: true });
window.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    zoom = Math.max(0.3, Math.min(3, p0z * (d / p0d)));
    applyT();
  }
}, { passive: true });

document.getElementById('btn').addEventListener('click', () =>
  autoOn ? stopAuto() : startAuto()
);
setTimeout(() => document.getElementById('hint').classList.add('gone'), 4000);
</script>
</body>
</html>
