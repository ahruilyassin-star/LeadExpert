<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khamrah Lattafa – 3D Parfum</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#fff;overflow:hidden;font-family:Georgia,serif;-webkit-user-select:none;user-select:none}
    canvas{display:block;cursor:grab}
    canvas:active{cursor:grabbing}
    #ui{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none}
    #ui h1{color:rgba(120,80,10,.88);font-size:1.2rem;letter-spacing:5px;font-weight:normal;text-transform:uppercase}
    #ui .ar{color:rgba(140,90,10,.55);font-size:1.05rem;margin-top:3px}
    #ui p{color:rgba(100,70,10,.38);font-size:.58rem;letter-spacing:3px;margin-top:7px;text-transform:uppercase}
    #hint{position:fixed;top:18px;left:50%;transform:translateX(-50%);color:rgba(100,70,10,.42);font-size:.6rem;letter-spacing:3px;text-transform:uppercase;pointer-events:none;white-space:nowrap;transition:opacity 1.5s}
    #hint.gone{opacity:0}
    #btn{position:fixed;bottom:26px;right:18px;background:rgba(180,130,20,.1);border:1px solid rgba(160,110,20,.35);color:rgba(100,65,5,.8);font-size:.58rem;letter-spacing:2px;padding:8px 14px;cursor:pointer;text-transform:uppercase;border-radius:2px}
    #btn:hover{background:rgba(180,130,20,.22)}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Sleep om te draaien &nbsp;·&nbsp; Scroll om in te zoomen</div>
<div id="ui">
  <h1>Khamrah &nbsp;·&nbsp; Lattafa</h1>
  <div class="ar">خمرة</div>
  <p>For Women &amp; Men &nbsp;·&nbsp; Eau de Parfum</p>
</div>
<button id="btn">⟳ Auto-rotatie</button>
<script>
// ── Canvas ────────────────────────────────────────────────────────────────────
const CV = document.getElementById('c'), ctx = CV.getContext('2d');
function resize(){ CV.width = innerWidth; CV.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

// ── Label texture ─────────────────────────────────────────────────────────────
const LC = document.createElement('canvas');
LC.width = 300; LC.height = 190;
const lx = LC.getContext('2d');
const lg = lx.createLinearGradient(0,0,300,190);
lg.addColorStop(0,'#5a3e08'); lg.addColorStop(.2,'#b87e18');
lg.addColorStop(.5,'#e8bc42'); lg.addColorStop(.8,'#b87e18'); lg.addColorStop(1,'#5a3e08');
lx.fillStyle=lg; lx.fillRect(0,0,300,190);
lx.strokeStyle='#ffe880'; lx.lineWidth=5; lx.strokeRect(7,7,286,176);
lx.lineWidth=1.5; lx.strokeRect(13,13,274,164);
lx.fillStyle='#140700'; lx.textAlign='center'; lx.textBaseline='middle';
lx.font='bold 64px serif'; lx.fillText('خمرة',150,72);
lx.font='bold 26px serif'; lx.fillText('KHAMRAH',150,128);
lx.font='15px serif';      lx.fillText('Lattafa Perfumes',150,162);

// ── 3D math (Y-up, Z toward viewer) ──────────────────────────────────────────
const rotY=(p,a)=>({x:p.x*Math.cos(a)+p.z*Math.sin(a),y:p.y,z:-p.x*Math.sin(a)+p.z*Math.cos(a)});
const rotX=(p,a)=>({x:p.x,y:p.y*Math.cos(a)-p.z*Math.sin(a),z:p.y*Math.sin(a)+p.z*Math.cos(a)});
const tr=(p,ay,ax)=>rotX(rotY(p,ay),ax);
const proj=(p,cx,cy,s)=>{const f=800/(800+p.z);return{x:cx+p.x*f*s,y:cy-p.y*f*s};};

// ── Build box geometry ────────────────────────────────────────────────────────
// cy = center Y (Y-up), hw/hh/hd = half dims, mat = material name
function mkBox(cy,hw,hh,hd,mat){
  const[x0,x1,y0,y1,z0,z1]=[-hw,hw,cy-hh,cy+hh,-hd,hd];
  const V=[
    {x:x0,y:y1,z:z0},{x:x1,y:y1,z:z0},{x:x1,y:y0,z:z0},{x:x0,y:y0,z:z0},
    {x:x0,y:y1,z:z1},{x:x1,y:y1,z:z1},{x:x1,y:y0,z:z1},{x:x0,y:y0,z:z1},
  ];
  return[
    {pts:[V[0],V[1],V[2],V[3]],nx:0,ny:0,nz:-1,side:'back', mat},
    {pts:[V[4],V[5],V[6],V[7]],nx:0,ny:0,nz:+1,side:'front',mat},
    {pts:[V[0],V[4],V[7],V[3]],nx:-1,ny:0,nz:0,side:'left', mat},
    {pts:[V[5],V[1],V[2],V[6]],nx:+1,ny:0,nz:0,side:'right',mat},
    {pts:[V[4],V[0],V[1],V[5]],nx:0,ny:+1,nz:0,side:'top',  mat},
    {pts:[V[7],V[6],V[2],V[3]],nx:0,ny:-1,nz:0,side:'bot',  mat},
  ];
}

// ── Bottle faces ──────────────────────────────────────────────────────────────
// Total height 393 units, centered at origin (Y-up)
// cap(65)+collar(8)+upper(161)+divider(7)+lower(145)+base(7)=393
const FACES=[
  ...mkBox(+164,  54, 32.5, 54,'capGlass'),  // cap
  ...mkBox(+127.5,62,  4,   62,'gold'),       // collar
  ...mkBox( +43,  60, 80.5, 60,'cutGlass'),   // upper body
  ...mkBox( -41,  62,  3.5, 62,'gold'),       // divider ring
  ...mkBox(-117,  55, 68.5, 55,'amber'),      // amber liquid (inner)
  ...mkBox(-117,  60, 72.5, 60,'clearGlass'), // lower glass shell
  ...mkBox(-193,  62,  3.5, 62,'gold'),       // base trim
];
// Cap top face → gold
FACES.find(f=>f.mat==='capGlass'&&f.side==='top').mat='gold';

// ── State ─────────────────────────────────────────────────────────────────────
let ay=0.3, ax=-0.12, zoom=1;
let drag=false, lxp=0, lyp=0, vy=0, autoOn=true, prevT=0;

function scale(){ return Math.min(CV.height*0.65, CV.width*0.85)/393*zoom; }

// ── Draw a projected face ─────────────────────────────────────────────────────
function drawFace(face, pp){
  const mat=face.mat, side=face.side;
  const xs=pp.map(p=>p.x), ys=pp.map(p=>p.y);
  const x0=Math.min(...xs), x1=Math.max(...xs);
  const y0=Math.min(...ys), y1=Math.max(...ys);
  const mx=(x0+x1)/2, my=(y0+y1)/2;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pp[0].x,pp[0].y);
  pp.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.closePath();
  ctx.clip();

  function fill(style){ ctx.fillStyle=style; ctx.beginPath(); ctx.moveTo(pp[0].x,pp[0].y); pp.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.closePath(); ctx.fill(); }
  function stroke(style,w){ ctx.strokeStyle=style; ctx.lineWidth=w; ctx.beginPath(); ctx.moveTo(pp[0].x,pp[0].y); pp.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.closePath(); ctx.stroke(); }

  if(mat==='gold'){
    const g=ctx.createLinearGradient(x0,y0,x1,y1);
    g.addColorStop(0,'#705010'); g.addColorStop(.3,'#e8b838');
    g.addColorStop(.7,'#c08828'); g.addColorStop(1,'#705010');
    fill(g); stroke('rgba(255,210,70,.35)',.5);
  }
  else if(mat==='amber'){
    const g=ctx.createLinearGradient(mx,y0,mx,y1);
    g.addColorStop(0,'rgba(200,100,0,.92)'); g.addColorStop(1,'rgba(150,62,0,.96)');
    fill(g);
    if(side==='front'||side==='right'||side==='left'){
      const h=ctx.createLinearGradient(x0,my,x1,my);
      h.addColorStop(0,'rgba(255,155,25,.2)'); h.addColorStop(.35,'rgba(255,155,25,0)');
      fill(h);
    }
  }
  else if(mat==='clearGlass'){
    const al=side==='back'?.07:.13;
    fill(`rgba(215,232,255,${al})`);
    stroke(`rgba(200,225,255,${al*2})`, .5);
    if(side==='front'||side==='right'){
      const h=ctx.createLinearGradient(x0,my,x1,my);
      h.addColorStop(0,'rgba(255,255,255,.15)'); h.addColorStop(.3,'rgba(255,255,255,.04)'); h.addColorStop(1,'rgba(255,255,255,0)');
      fill(h);
    }
    if(side==='front'||side==='back'){
      const lw=(x1-x0)*.82, lh=lw*(190/300);
      ctx.globalAlpha=.9; ctx.drawImage(LC,mx-lw/2,my-lh/2,lw,lh); ctx.globalAlpha=1;
    }
  }
  else if(mat==='cutGlass'){
    const al=side==='back'?.08:.16;
    fill(`rgba(220,235,255,${al})`);
    // Diamond cut lines
    const step=Math.max(8,13*scale());
    ctx.strokeStyle=`rgba(255,255,255,${side==='front'?.3:.17})`; ctx.lineWidth=.65;
    for(let i=x0-step*3;i<x1+step*3;i+=step){
      const h=y1-y0;
      ctx.beginPath(); ctx.moveTo(i,y0); ctx.lineTo(i+h,y1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(i,y1); ctx.lineTo(i+h,y0); ctx.stroke();
    }
    stroke(`rgba(200,225,255,${al*1.8})`,.5);
    if(side==='front'||side==='right'){
      const h=ctx.createLinearGradient(x0,my,x1,my);
      h.addColorStop(0,'rgba(255,255,255,.18)'); h.addColorStop(.25,'rgba(255,255,255,.05)'); h.addColorStop(1,'rgba(255,255,255,0)');
      fill(h);
    }
  }
  else if(mat==='capGlass'){
    const al=side==='back'?.09:.16;
    fill(`rgba(225,238,255,${al})`);
    stroke(`rgba(200,225,255,${al*2})`,.5);
    if(side==='front'||side==='right'){
      const h=ctx.createLinearGradient(x0,my,x1,my);
      h.addColorStop(0,'rgba(255,255,255,.16)'); h.addColorStop(.28,'rgba(255,255,255,.04)'); h.addColorStop(1,'rgba(255,255,255,0)');
      fill(h);
    }
  }

  ctx.restore();
}

// ── Render loop ───────────────────────────────────────────────────────────────
function render(ts=0){
  const dt=Math.min(ts-prevT,50); prevT=ts;
  if(autoOn) ay+=dt*.0008;

  ctx.clearRect(0,0,CV.width,CV.height);
  const cx=CV.width/2, cy=CV.height/2, s=scale();

  // Ground shadow
  const botY=cy+196.5*s*.98;
  const sg=ctx.createRadialGradient(cx,botY,2,cx,botY,68*s);
  sg.addColorStop(0,'rgba(160,120,40,.18)'); sg.addColorStop(1,'rgba(160,120,40,0)');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.ellipse(cx,botY+4,68*s,11*s,0,0,Math.PI*2); ctx.fill();

  // Transform all faces
  const isGlass=m=>m==='clearGlass'||m==='cutGlass'||m==='capGlass';
  const tF=FACES.map(f=>{
    const rp=f.pts.map(p=>tr(p,ay,ax));
    const avgZ=rp.reduce((s,p)=>s+p.z,0)/4;
    const pp=rp.map(p=>proj(p,cx,cy,s));
    const n=tr({x:f.nx,y:f.ny,z:f.nz},ay,ax);
    return{f,pp,avgZ,fwd:n.z>0};
  });

  // Sort back to front
  tF.sort((a,b)=>a.avgZ-b.avgZ);

  // Draw
  tF.forEach(({f,pp,fwd})=>{
    if(!fwd&&!isGlass(f.mat)) return;
    drawFace(f,pp);
  });

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ── Controls ──────────────────────────────────────────────────────────────────
function dn(x,y){ drag=true; vy=0; lxp=x; lyp=y; autoOn=false; document.getElementById('btn').textContent='⟳ Auto-rotatie'; }
function mv(x,y){ if(!drag)return; vy=(x-lxp)*.008; ay+=vy; ax=Math.max(-.5,Math.min(.25,ax+(y-lyp)*.004)); lxp=x; lyp=y; }
function up(){ if(!drag)return; drag=false; (function c(){vy*=.92;ay+=vy;if(Math.abs(vy)>.0005)requestAnimationFrame(c);})(); }

CV.addEventListener('mousedown',e=>dn(e.clientX,e.clientY));
window.addEventListener('mousemove',e=>mv(e.clientX,e.clientY));
window.addEventListener('mouseup',up);
CV.addEventListener('touchstart',e=>{if(e.touches.length===1)dn(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
window.addEventListener('touchmove',e=>{if(drag&&e.touches.length===1)mv(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
window.addEventListener('touchend',up);
window.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(.3,Math.min(3,zoom*(1-e.deltaY*.001)));},{passive:false});
let pd=0,pz=1;
window.addEventListener('touchstart',e=>{if(e.touches.length===2){drag=false;pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pz=zoom;}},{passive:true});
window.addEventListener('touchmove',e=>{if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);zoom=Math.max(.3,Math.min(3,pz*(d/pd)));}},{passive:true});

document.getElementById('btn').addEventListener('click',()=>{
  autoOn=!autoOn;
  document.getElementById('btn').textContent=autoOn?'⏸ Stoppen':'⟳ Auto-rotatie';
});
setTimeout(()=>document.getElementById('hint').classList.add('gone'),4000);
</script>
</body>
</html>
