name = "leadexpert-scroll"
compatibility_date = "2024-09-23"

# Static-asset Worker serving the scroll-cinematic site from this folder.
# Deploy from your machine (where wrangler is already authed, same as
# tools.leadexpert.be):
#
#   cd leadexpert && npx wrangler deploy
#
# This publishes to https://scroll.leadexpert.be (custom domain provisioned
# automatically on the leadexpert.be zone) and also leadexpert-scroll.workers.dev.
[assets]
directory = "."

# Branded custom domain on the leadexpert.be Cloudflare zone.
[[routes]]
pattern = "scroll.leadexpert.be"
custom_domain = true
