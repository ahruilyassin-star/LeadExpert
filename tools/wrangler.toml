name = "leadexpert-tools"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
APP_NAME = "LeadExpert Tools"
APP_VERSION = "1.0.0"

# ─── Growth Engine: lead capture (all optional, set when ready) ───────────────
# The funnel forms POST to /api/lead. It works without any of the below
# (the form has a WhatsApp fallback), but to capture/forward leads:
#
# 1) Persist every lead in KV — create a namespace, then uncomment:
#    wrangler kv namespace create LEADS
# [[kv_namespaces]]
# binding = "LEADS"
# id = "<paste-the-id-from-the-command-above>"
#
# 2) Forward leads to n8n / Zapier / Make (→ email, CRM, Slack, ...):
#    wrangler secret put LEAD_WEBHOOK_URL
#
# 3) Or email leads directly via Resend:
#    wrangler secret put RESEND_API_KEY
#    wrangler secret put LEAD_TO        # e.g. info@leadexpert.be
#    wrangler secret put LEAD_FROM      # e.g. "LeadExpert <leads@leadexpert.be>"
#
# 4) Protect the leads admin view (GET /api/leads?key=...):
#    wrangler secret put ADMIN_KEY
