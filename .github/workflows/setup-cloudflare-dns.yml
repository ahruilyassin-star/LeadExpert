name: Setup Cloudflare DNS for leadexpert.be

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/setup-cloudflare-dns.yml'

jobs:
  setup-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Set DNS A records and CNAME
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          CF_EMAIL: ahruil.yassin@gmail.com
        run: |
          set -e
          AUTH_HEADERS=(-H "X-Auth-Email: $CF_EMAIL" -H "X-Auth-Key: $CF_TOKEN")

          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=leadexpert.be" \
            "${AUTH_HEADERS[@]}" -H "Content-Type: application/json" | jq -r '.result[0].id')
          echo "Zone ID: $ZONE_ID"

          # Delete root CNAME (conflicts with A records)
          ROOT_CNAME_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=CNAME&name=leadexpert.be" \
            "${AUTH_HEADERS[@]}" | jq -r '.result[0].id // empty')
          if [ -n "$ROOT_CNAME_ID" ]; then
            curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$ROOT_CNAME_ID" \
              "${AUTH_HEADERS[@]}" > /dev/null
            echo "Deleted root CNAME (was pointing to Cloudflare Pages)"
          fi

          # Delete any existing A records for root
          A_IDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=A&name=leadexpert.be" \
            "${AUTH_HEADERS[@]}" | jq -r '.result[].id')
          for id in $A_IDS; do
            curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$id" \
              "${AUTH_HEADERS[@]}" > /dev/null
            echo "Deleted A record $id"
          done

          # Add GitHub Pages A records
          for IP in 185.199.108.153 185.199.109.153 185.199.110.153 185.199.111.153; do
            RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              "${AUTH_HEADERS[@]}" -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"leadexpert.be\",\"content\":\"$IP\",\"ttl\":1,\"proxied\":false}")
            echo "A $IP: $(echo $RESULT | jq -r '.success')"
          done

          # Ensure CNAME www -> GitHub Pages
          CNAME_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=CNAME&name=www.leadexpert.be" \
            "${AUTH_HEADERS[@]}" | jq -r '.result[0].id // empty')
          if [ -n "$CNAME_ID" ]; then
            echo "CNAME www already exists"
          else
            RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              "${AUTH_HEADERS[@]}" -H "Content-Type: application/json" \
              --data '{"type":"CNAME","name":"www","content":"ahruilyassin-star.github.io","ttl":1,"proxied":false}')
            echo "CNAME www: $(echo $RESULT | jq -r '.success')"
          fi

          echo "--- Final DNS for leadexpert.be ---"
          curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            "${AUTH_HEADERS[@]}" | jq -r '.result[] | .type + " " + .name + " -> " + .content'

          echo "DNS setup complete!"
