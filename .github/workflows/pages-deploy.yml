name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [claude/new-session-fva7gp, main, claude/belgian-news-scraper-o94042]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate all funnel pages
        run: node tools/generate-static.mjs

      - name: Enable GitHub Pages (auto-configure)
        continue-on-error: true
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/pages \
            -f "source[branch]=gh-pages" \
            -f "source[path]=/" \
          && echo "Pages enabled!" || echo "Pages may already be enabled or needs manual activation."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: leadexpert.be
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy: ${{ github.event.head_commit.message || github.event_name }}'

      - name: Set custom domain & enforce HTTPS (remove "Not Secure")
        continue-on-error: true
        run: |
          # Register the custom domain in Pages settings (triggers Let's Encrypt cert).
          gh api --method PUT -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/pages \
            -f "cname=leadexpert.be" || echo "cname set skipped"
          # Show current certificate state for visibility in the logs.
          gh api /repos/${{ github.repository }}/pages \
            -q '"domain="+.cname+" | https_certificate="+(.https_certificate.state // "pending")+" | https_enforced="+( .https_enforced|tostring)' || true
          # Enforce HTTPS - only succeeds once the certificate is issued; safe to retry on every run.
          gh api --method PUT -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/pages \
            -F "https_enforced=true" \
            && echo "HTTPS enforced - Not Secure warning removed." \
            || echo "Certificate not ready yet; will enforce on the next scheduled run."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
