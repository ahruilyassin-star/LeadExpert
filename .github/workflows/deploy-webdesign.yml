name: Deploy webdesign.leadexpert.be

on:
  push:
    branches: [main]
    paths:
      - "webdesign-leadexpert/**"
      - ".github/workflows/deploy-webdesign.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Cloudflare secrets
        id: check
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && [ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Deploy overgeslagen: CLOUDFLARE_API_TOKEN en/of CLOUDFLARE_ACCOUNT_ID ontbreken."
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.check.outputs.ready == 'true'
        with:
          node-version: 20

      - name: Deploy webdesign.leadexpert.be
        if: steps.check.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: webdesign-leadexpert
          command: deploy
