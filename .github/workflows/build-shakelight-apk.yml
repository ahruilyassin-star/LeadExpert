name: Build ShakeLight APK

on:
  push:
    branches: [ main, claude/shake-light-stability-luxbtx ]
    paths:
      - 'shake-flashlight/**'
      - '.github/workflows/build-shakelight-apk.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'shake-flashlight/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        working-directory: shake-flashlight
        run: gradle wrapper --gradle-version 8.4

      - name: Build Release APK
        working-directory: shake-flashlight
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          cp shake-flashlight/app/build/outputs/apk/release/app-release.apk \
             shake-flashlight/app/build/outputs/apk/release/ShakeLight.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShakeLight-release-apk
          path: shake-flashlight/app/build/outputs/apk/release/ShakeLight.apk
          retention-days: 30
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: shakelight-latest
          name: "ShakeLight — Laatste versie"
          body: |
            ## ShakeLight APK

            **Direct installeren op je Android telefoon:**
            1. Download `ShakeLight.apk` hieronder
            2. Open het bestand op je telefoon
            3. Sta installatie toe als gevraagd (Instellingen → Onbekende bronnen)
            4. Installeer en open ShakeLight

            ---
            *Automatisch gebouwd vanuit de broncode*
          files: shake-flashlight/app/build/outputs/apk/release/ShakeLight.apk
          make_latest: true
          prerelease: false
