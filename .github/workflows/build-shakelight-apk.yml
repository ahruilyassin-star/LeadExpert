name: Build ShakeLight APK

on:
  push:
    branches: [ main, claude/shake-light-stability-luxbtx ]
    paths:
      - 'shake-flashlight/**'
      - '.github/workflows/build-shakelight-apk.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'shake-flashlight/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        working-directory: shake-flashlight
        run: gradle wrapper --gradle-version 8.4

      - name: Build Debug APK
        working-directory: shake-flashlight
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShakeLight-debug-apk
          path: shake-flashlight/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: APK info
        run: |
          APK=shake-flashlight/app/build/outputs/apk/debug/app-debug.apk
          SIZE=$(du -h "$APK" | cut -f1)
          echo "✅ APK klaar: $SIZE"
          echo "📱 Download via de 'Artifacts' sectie van deze GitHub Actions run"
