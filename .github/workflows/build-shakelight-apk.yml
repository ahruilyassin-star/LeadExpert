name: Build ShakeLight APK

on:
  push:
    branches: [ main, claude/shake-light-stability-luxbtx ]
    paths:
      - 'shake-flashlight/**'
      - '.github/workflows/build-shakelight-apk.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'shake-flashlight/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        working-directory: shake-flashlight
        run: gradle wrapper --gradle-version 8.4

      - name: Setup signing keystore
        working-directory: shake-flashlight/app
        run: |
          if [ -n "$RELEASE_KEYSTORE" ]; then
            echo "$RELEASE_KEYSTORE" | base64 -d > release.jks
            echo "SIGN_PASS=$RELEASE_STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "SIGN_ALIAS=$RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
          else
            PASS=$(openssl rand -base64 16)
            keytool -genkeypair \
              -alias shakelight \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -keystore release.jks \
              -storepass "$PASS" -keypass "$PASS" \
              -dname "CN=ShakeLight,OU=LeadExpert,O=LeadExpert,L=Antwerpen,ST=Antwerpen,C=BE" \
              -noprompt
            echo "SIGN_PASS=$PASS" >> "$GITHUB_ENV"
            echo "SIGN_ALIAS=shakelight" >> "$GITHUB_ENV"
          fi
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

      - name: Build Release APK
        working-directory: shake-flashlight
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          SIGN_PASS: ${{ env.SIGN_PASS }}
          SIGN_ALIAS: ${{ env.SIGN_ALIAS }}

      - name: Rename APK
        run: |
          cp shake-flashlight/app/build/outputs/apk/release/app-release.apk \
             shake-flashlight/app/build/outputs/apk/release/ShakeLight.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShakeLight-release-apk
          path: shake-flashlight/app/build/outputs/apk/release/ShakeLight.apk
          retention-days: 30
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: shakelight-latest
          name: "ShakeLight — Laatste versie"
          body: |
            ## ShakeLight APK

            **Direct installeren op je Android telefoon:**
            1. Download `ShakeLight.apk` hieronder
            2. Open het bestand op je telefoon
            3. Sta installatie toe als gevraagd (Instellingen → Onbekende bronnen)
            4. Installeer en open ShakeLight

            ---
            *Automatisch gebouwd vanuit de broncode*
          files: shake-flashlight/app/build/outputs/apk/release/ShakeLight.apk
          make_latest: true
          prerelease: false
