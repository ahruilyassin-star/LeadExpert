name: Deploy admin dashboard

# Deploys the Cloudflare Worker whenever the dashboard code changes on main.
# Run it manually the first time from the Actions tab ("Run workflow").
on:
  push:
    branches: [main]
    paths:
      - "admin-dashboard/**"
      - ".github/workflows/deploy-admin.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # Requires two repo secrets (Settings → Secrets and variables → Actions):
      #   CLOUDFLARE_API_TOKEN  – token with "Edit Workers" permission
      #   CLOUDFLARE_ACCOUNT_ID – your Cloudflare account id
      # The Worker's own secrets (SHOPIFY_ADMIN_TOKEN, ADMIN_PASSWORD, …) are
      # set once with `wrangler secret put` and are NOT needed here.
      - name: Deploy with Wrangler
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
