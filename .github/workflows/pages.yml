name: Deploy to GitHub Pages

on:
  push:
    branches: [main, gh-pages, "claude/leadexpert-website-optimization-A5PMG"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable GitHub Pages (idempotent)
        run: |
          curl -sS -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}' || echo "Pages may already be enabled — continuing."

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage static site
        run: |
          mkdir -p _site
          # Copy everything except .git, .github, node_modules, *.md
          rsync -a --exclude='.git' --exclude='.github' --exclude='node_modules' \
                --exclude='STRATEGIE.md' --exclude='README.md' \
                ./ _site/
          # Ensure CNAME exists for custom domain
          echo "webdesign.leadexpert.be" > _site/CNAME
          ls -la _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
