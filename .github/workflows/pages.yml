name: Deploy to GitHub Pages

on:
  push:
    branches: [main, "claude/leadexpert-website-optimization-A5PMG"]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  configure-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - name: Configure Pages source = gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          # Try update first; if Pages doesn't exist, create it
          PUT=$(curl -sS -o /tmp/r1.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/pages" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')
          echo "PUT /pages → $PUT"
          cat /tmp/r1.json || true; echo
          if [ "$PUT" = "404" ]; then
            POST=$(curl -sS -o /tmp/r2.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/pages" \
              -d '{"source":{"branch":"gh-pages","path":"/"}}')
            echo "POST /pages → $POST"
            cat /tmp/r2.json || true; echo
          fi
          # Show current Pages config
          curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pages" | tee /tmp/pages.json
          echo

  deploy:
    needs: configure-pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Stage static site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='STRATEGIE.md' \
            --exclude='README.md' \
            ./ _site/
          echo "webdesign.leadexpert.be" > _site/CNAME
          echo "--- Staged files ---"
          ls -la _site/

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          cname: webdesign.leadexpert.be
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_message: "deploy: ${{ github.sha }}"

      - name: Report URL
        env:
          REPO: ${{ github.repository }}
        run: |
          owner=$(echo "$REPO" | cut -d/ -f1)
          name=$(echo "$REPO" | cut -d/ -f2)
          echo "::notice title=Live URL::https://${owner}.github.io/${name}/"
          echo "::notice title=Custom domain (after DNS)::https://webdesign.leadexpert.be/"
